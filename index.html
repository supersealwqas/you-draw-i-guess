<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你画我猜小游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .game-container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 800px;
      width: 100%;
    }

    #canvas {
      border: 2px dashed #ccc;
      border-radius: 8px;
      cursor: crosshair;
      display: block;
      width: 100%;
      background: white;
      touch-action: none;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .color-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #ddd;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .color-btn:hover, .color-btn.active {
      transform: scale(1.2);
      border-color: #333;
    }

    .size-slider {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .size-slider input { width: 100px; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }

    .btn-guess {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 16px;
      padding: 12px 24px;
    }
    .btn-guess:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-clear { background: #ff6b6b; color: white; }
    .btn-undo { background: #ffd93d; color: #333; }
    .btn-eraser { background: #a8e6cf; color: #333; }
    .btn-eraser.active { outline: 2px solid #333; }

    .result-area {
      margin-top: 20px;
      padding: 20px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 12px;
      text-align: center;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .result-area .label {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .result-area .guess {
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .result-area .loading {
      color: white;
      font-size: 18px;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .history {
      margin-top: 20px;
    }
    .history h3 {
      font-size: 16px;
      color: #333;
      margin-bottom: 8px;
    }
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .history-item {
      background: #e9ecef;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .toolbar { gap: 8px; }
      .btn { padding: 6px 12px; font-size: 12px; }
      .btn-guess { font-size: 14px; }
    }
  </style>
</head>
<body>
  <h1>🎨 你画我猜</h1>

  <div class="game-container">
    <canvas id="canvas" width="752" height="450"></canvas>

    <div class="toolbar">
      <div class="color-btn active" style="background: #000" data-color="#000000"></div>
      <div class="color-btn" style="background: #e74c3c" data-color="#e74c3c"></div>
      <div class="color-btn" style="background: #3498db" data-color="#3498db"></div>
      <div class="color-btn" style="background: #2ecc71" data-color="#2ecc71"></div>
      <div class="color-btn" style="background: #f39c12" data-color="#f39c12"></div>

      <div class="size-slider">
        <span>粗细:</span>
        <input type="range" id="sizeSlider" min="1" max="20" value="3">
        <span id="sizeValue">3</span>
      </div>

      <button class="btn btn-eraser" id="eraserBtn">橡皮擦</button>
      <button class="btn btn-undo" id="undoBtn">撤销</button>
      <button class="btn btn-clear" id="clearBtn">清空</button>
      <button class="btn btn-guess" id="guessBtn">发送猜测</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="label">AI 猜测结果</div>
      <div class="guess">画一幅画，点击"发送猜测"</div>
    </div>

    <div class="stats">
      <span>猜测次数: <strong id="guessCount">0</strong></span>
      <span id="statusText">就绪</span>
    </div>

    <div class="history" id="historySection" style="display: none;">
      <h3>猜测历史</h3>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultArea = document.getElementById('resultArea');
    const guessBtn = document.getElementById('guessBtn');
    const clearBtn = document.getElementById('clearBtn');
    const undoBtn = document.getElementById('undoBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeValue = document.getElementById('sizeValue');
    const guessCountEl = document.getElementById('guessCount');
    const statusText = document.getElementById('statusText');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');

    let isDrawing = false;
    let currentColor = '#000000';
    let brushSize = 3;
    let isEraser = false;
    let guessCount = 0;
    let history = [];

    // Initialize canvas background as white
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Save initial state
    saveState();

    // Drawing functions
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);

      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.strokeStyle = isEraser ? 'white' : currentColor;
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function endDraw(e) {
      if (isDrawing) {
        isDrawing = false;
        saveState();
      }
    }

    function saveState() {
      history.push(canvas.toDataURL());
      if (history.length > 30) history.shift();
    }

    // Event listeners
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseout', endDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    // Color buttons
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentColor = btn.dataset.color;
        isEraser = false;
        eraserBtn.classList.remove('active');
      });
    });

    // Size slider
    sizeSlider.addEventListener('input', () => {
      brushSize = parseInt(sizeSlider.value);
      sizeValue.textContent = brushSize;
    });

    // Eraser
    eraserBtn.addEventListener('click', () => {
      isEraser = !isEraser;
      eraserBtn.classList.toggle('active');
    });

    // Undo
    undoBtn.addEventListener('click', () => {
      if (history.length > 1) {
        history.pop();
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.src = history[history.length - 1];
      }
    });

    // Clear
    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      saveState();
    });

    // Send guess
    guessBtn.addEventListener('click', async () => {
      const imageData = canvas.toDataURL('image/png').split(',')[1];

      guessBtn.disabled = true;
      resultArea.innerHTML = `
        <div class="label">AI 正在思考</div>
        <div class="loading loading-dots"></div>
      `;
      statusText.textContent = '发送中...';

      try {
        const response = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gemma3',
            prompt: '你画我猜游戏。请仔细观察这幅简笔画，猜测用户画的是什么。只回答一个最可能的中文词语或短句，不超过10个字。不要解释，直接给出答案。',
            images: [imageData],
            stream: false
          })
        });

        if (!response.ok) {
          throw new Error(`Ollama 返回错误: ${response.status}`);
        }

        const data = await response.json();
        const guess = data.response.trim();

        guessCount++;
        guessCountEl.textContent = guessCount;

        resultArea.innerHTML = `<div class="label">AI 猜测结果</div><div class="guess">${guess}</div>`;
        statusText.textContent = '完成';

        // Add to history
        historySection.style.display = 'block';
        const item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = guess;
        historyList.prepend(item);

      } catch (error) {
        resultArea.innerHTML = `
          <div class="label">出错了</div>
          <div class="guess" style="font-size: 16px;">${error.message}</div>
        `;
        statusText.textContent = '错误';
      } finally {
        guessBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
