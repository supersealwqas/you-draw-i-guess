<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你画我猜 · AI Vision Studio</title>
  <meta name="description" content="用画笔描绘你的想象，或上传图片让 AI 来识别描述！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #0f0c29;
      --bg-mid: #302b63;
      --bg-end: #24243e;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
      --accent-1: #a78bfa;
      --accent-2: #f472b6;
      --accent-3: #38bdf8;
      --text-primary: #f1f5f9;
      --text-secondary: rgba(241, 245, 249, 0.6);
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      overflow-x: hidden;
      position: relative;
    }

    /* ========== Animated Background ========== */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-orbs span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .bg-orbs span:nth-child(1) {
      width: 400px; height: 400px;
      background: var(--accent-1);
      top: -10%; left: -5%;
      animation-delay: 0s;
    }
    .bg-orbs span:nth-child(2) {
      width: 350px; height: 350px;
      background: var(--accent-2);
      bottom: -10%; right: -5%;
      animation-delay: -4s;
    }
    .bg-orbs span:nth-child(3) {
      width: 300px; height: 300px;
      background: var(--accent-3);
      top: 40%; left: 50%;
      animation-delay: -8s;
    }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -30px) scale(1.1); }
      100% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ========== Header ========== */
    .header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      animation: titleGlow 4s ease-in-out infinite alternate;
    }
    .header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 6px;
    }
    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 12px rgba(167, 139, 250, 0.4)); }
      100% { filter: drop-shadow(0 0 20px rgba(244, 114, 182, 0.5)); }
    }

    /* ========== Glass Card ========== */
    .game-container {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
      padding: 24px;
      max-width: 820px;
      width: 100%;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ========== Canvas ========== */
    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.15);
    }
    #canvas {
      display: block;
      width: 100%;
      background: #ffffff;
      cursor: crosshair;
      touch-action: none;
      border-radius: 12px;
    }

    /* ========== Toolbar ========== */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
    }
    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: rgba(255, 255, 255, 0.12);
      margin: 0 4px;
    }

    /* Color Buttons */
    .color-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }
    .color-btn::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: var(--transition);
    }
    .color-btn:hover {
      transform: scale(1.15);
    }
    .color-btn.active::after {
      border-color: var(--accent-1);
    }
    .color-btn.active {
      transform: scale(1.15);
      box-shadow: 0 0 12px rgba(167, 139, 250, 0.5);
    }

    /* Size Slider */
    .size-slider {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .size-slider input[type="range"] {
      -webkit-appearance: none;
      width: 90px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    .size-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-1);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(167, 139, 250, 0.5);
      transition: var(--transition);
    }
    .size-slider input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .size-value {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      background: rgba(167, 139, 250, 0.2);
      border-radius: 6px;
      color: var(--accent-1);
      font-weight: 700;
      font-size: 12px;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: var(--transition);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn:hover::before { opacity: 1; }
    .btn:active {
      transform: translateY(0) scale(0.97);
    }

    .btn-eraser {
      background: rgba(56, 189, 248, 0.2);
      color: var(--accent-3);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .btn-eraser.active {
      background: rgba(56, 189, 248, 0.35);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.3);
    }
    .btn-undo {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .btn-clear {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .btn-guess {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: white;
      font-size: 15px;
      padding: 10px 24px;
      border: none;
      box-shadow: 0 4px 20px rgba(167, 139, 250, 0.35);
      margin-left: auto;
    }
    .btn-guess:hover {
      box-shadow: 0 6px 28px rgba(167, 139, 250, 0.5);
    }
    .btn-guess:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-guess:disabled:hover::before { opacity: 0; }

    /* ========== Result Area ========== */
    .result-area {
      margin-top: 20px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      text-align: center;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: var(--transition);
    }
    .result-area.has-result {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.15), rgba(244, 114, 182, 0.15));
      border-color: rgba(167, 139, 250, 0.25);
    }
    .result-area.has-error {
      background: linear-gradient(135deg, rgba(248, 113, 113, 0.15), rgba(251, 146, 60, 0.12));
      border-color: rgba(248, 113, 113, 0.25);
    }

    .result-area .label {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .result-area .guess {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: resultPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes resultPop {
      0% { opacity: 0; transform: scale(0.8) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-area .loading {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(167, 139, 250, 0.2);
      border-top-color: var(--accent-1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== Stats ========== */
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .stats strong {
      color: var(--accent-1);
      font-weight: 700;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    .status-dot.loading { background: #fbbf24; }
    .status-dot.error { background: #f87171; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ========== History ========== */
    .history {
      margin-top: 16px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .history h3 {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .history-item {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-primary);
      animation: chipPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transition: var(--transition);
    }
    .history-item:hover {
      background: rgba(167, 139, 250, 0.15);
      border-color: rgba(167, 139, 250, 0.3);
    }
    @keyframes chipPop {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ========== Responsive ========== */
    @media (max-width: 640px) {
      .header h1 { font-size: 2rem; }
      .game-container { padding: 16px; }
      .toolbar { gap: 8px; padding: 10px; }
      .btn { padding: 6px 12px; font-size: 12px; }
      .btn-guess { font-size: 13px; padding: 8px 18px; }
      .result-area .guess { font-size: 1.4rem; }
      .toolbar-divider { display: none; }
    }

    /* ========== Ripple Effect ========== */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ========== Tooltip ========== */
    [data-tip] {
      position: relative;
    }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(15, 12, 41, 0.9);
      color: var(--text-primary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }
    [data-tip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========== Tab Switcher ========== */
    .tab-switcher {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .tab-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.25), rgba(244, 114, 182, 0.2));
      color: var(--text-primary);
      box-shadow: 0 2px 12px rgba(167, 139, 250, 0.2);
    }

    .tab-panel {
      display: none;
      animation: tabFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tab-panel.active {
      display: block;
    }
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== Upload Zone ========== */
    .upload-zone {
      border: 2px dashed rgba(167, 139, 250, 0.3);
      border-radius: 14px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .upload-zone:hover {
      border-color: var(--accent-1);
      background: rgba(167, 139, 250, 0.06);
    }
    .upload-zone.dragover {
      border-color: var(--accent-2);
      background: rgba(244, 114, 182, 0.1);
      transform: scale(1.01);
    }
    .upload-zone.has-image {
      border-style: solid;
      border-color: rgba(167, 139, 250, 0.2);
      padding: 16px;
    }
    .upload-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .upload-text {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }
    .upload-text strong {
      color: var(--accent-1);
    }
    .upload-hint {
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 12px;
      opacity: 0.6;
    }
    .upload-preview {
      max-width: 100%;
      max-height: 400px;
      border-radius: 10px;
      object-fit: contain;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .upload-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }
    .btn-describe {
      background: linear-gradient(135deg, var(--accent-3), var(--accent-1));
      color: white;
      font-size: 15px;
      padding: 10px 24px;
      border: none;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.35);
    }
    .btn-describe:hover {
      box-shadow: 0 6px 28px rgba(56, 189, 248, 0.5);
    }
    .btn-describe:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-reupload {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* ========== Description Result ========== */
    .desc-result {
      margin-top: 20px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      transition: var(--transition);
    }
    .desc-result.has-result {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(167, 139, 250, 0.1));
      border-color: rgba(56, 189, 248, 0.2);
    }
    .desc-result .label {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }
    .desc-result .desc-text {
      color: var(--text-primary);
      font-size: 1.05rem;
      line-height: 1.8;
      animation: resultPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .desc-result .desc-text-placeholder {
      color: var(--text-secondary);
      text-align: center;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orbs">
    <span></span><span></span><span></span>
  </div>

  <div class="header">
    <h1>🎨 AI Vision Studio</h1>
    <p>画画让 AI 猜，或上传图片让 AI 描述</p>
  </div>

  <div class="game-container">
    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="draw">🖌️ 画画猜猜</button>
      <button class="tab-btn" data-tab="upload">📷 图片识别</button>
    </div>

    <!-- ===== Draw Panel ===== -->
    <div class="tab-panel active" id="drawPanel">
    <div class="canvas-wrapper">
      <canvas id="canvas" width="770" height="450"></canvas>
    </div>

    <div class="toolbar">
      <div class="color-btn active" style="background:#1e1e1e" data-color="#1e1e1e" data-tip="黑色"></div>
      <div class="color-btn" style="background:#ef4444" data-color="#ef4444" data-tip="红色"></div>
      <div class="color-btn" style="background:#3b82f6" data-color="#3b82f6" data-tip="蓝色"></div>
      <div class="color-btn" style="background:#22c55e" data-color="#22c55e" data-tip="绿色"></div>
      <div class="color-btn" style="background:#f59e0b" data-color="#f59e0b" data-tip="橙色"></div>
      <div class="color-btn" style="background:#a855f7" data-color="#a855f7" data-tip="紫色"></div>

      <div class="toolbar-divider"></div>

      <div class="size-slider">
        <span>粗细</span>
        <input type="range" id="sizeSlider" min="1" max="20" value="3">
        <span class="size-value" id="sizeValue">3</span>
      </div>

      <div class="toolbar-divider"></div>

      <button class="btn btn-eraser" id="eraserBtn" data-tip="橡皮擦">🧹 橡皮</button>
      <button class="btn btn-undo" id="undoBtn" data-tip="撤销上一步">↩ 撤销</button>
      <button class="btn btn-clear" id="clearBtn" data-tip="清空画布">🗑 清空</button>

      <button class="btn btn-guess" id="guessBtn">✨ 让 AI 猜</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="label">AI 猜测结果</div>
      <div class="guess">画一幅画，点击「让 AI 猜」</div>
    </div>

    <div class="stats">
      <span>猜测次数: <strong id="guessCount">0</strong></span>
      <span id="statusText"><span class="status-dot"></span>就绪</span>
    </div>

    <div class="history" id="historySection" style="display: none;">
      <h3>猜测历史</h3>
      <div class="history-list" id="historyList"></div>
    </div>
    </div><!-- /drawPanel -->

    <!-- ===== Upload Panel ===== -->
    <div class="tab-panel" id="uploadPanel">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <div class="upload-icon">📤</div>
        <div class="upload-text">拖拽图片到这里，或 <strong>点击选择文件</strong></div>
        <div class="upload-hint">支持 JPG / PNG / GIF / WebP</div>
      </div>

      <div class="desc-result" id="descResult">
        <div class="label">AI 图片描述</div>
        <div class="desc-text-placeholder">上传一张图片，让 AI 告诉你图片里有什么</div>
      </div>
    </div><!-- /uploadPanel -->
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultArea = document.getElementById('resultArea');
    const guessBtn = document.getElementById('guessBtn');
    const clearBtn = document.getElementById('clearBtn');
    const undoBtn = document.getElementById('undoBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeValueEl = document.getElementById('sizeValue');
    const guessCountEl = document.getElementById('guessCount');
    const statusText = document.getElementById('statusText');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');

    let isDrawing = false;
    let currentColor = '#1e1e1e';
    let brushSize = 3;
    let isEraser = false;
    let guessCount = 0;
    let undoStack = [];

    // Initialize canvas
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveState();

    // ========== Drawing ==========
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      // Draw a dot for single clicks
      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = isEraser ? 'white' : currentColor;
      ctx.lineTo(pos.x + 0.1, pos.y + 0.1);
      ctx.stroke();
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = isEraser ? 'white' : currentColor;
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function endDraw() {
      if (isDrawing) {
        isDrawing = false;
        saveState();
      }
    }

    function saveState() {
      undoStack.push(canvas.toDataURL());
      if (undoStack.length > 30) undoStack.shift();
    }

    // Mouse events
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseout', endDraw);

    // Touch events
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    // ========== Color Buttons ==========
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentColor = btn.dataset.color;
        isEraser = false;
        eraserBtn.classList.remove('active');
      });
    });

    // ========== Size Slider ==========
    sizeSlider.addEventListener('input', () => {
      brushSize = parseInt(sizeSlider.value);
      sizeValueEl.textContent = brushSize;
    });

    // ========== Eraser ==========
    eraserBtn.addEventListener('click', () => {
      isEraser = !isEraser;
      eraserBtn.classList.toggle('active');
      if (isEraser) {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      } else {
        // Re-activate the current color button
        document.querySelectorAll('.color-btn').forEach(b => {
          if (b.dataset.color === currentColor) b.classList.add('active');
        });
      }
    });

    // ========== Undo ==========
    undoBtn.addEventListener('click', () => {
      if (undoStack.length > 1) {
        undoStack.pop();
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.src = undoStack[undoStack.length - 1];
      }
    });

    // ========== Clear ==========
    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      saveState();
    });

    // ========== Ripple Effect ==========
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        this.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });

    // ========== AI Guess ==========
    guessBtn.addEventListener('click', async () => {
      const imageData = canvas.toDataURL('image/png').split(',')[1];

      guessBtn.disabled = true;
      resultArea.className = 'result-area';
      resultArea.innerHTML = `
        <div class="loading-spinner"></div>
        <div class="loading">AI 正在观察你的画作…</div>
      `;
      statusText.innerHTML = '<span class="status-dot loading"></span>思考中…';

      try {
        const response = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gemma3',
            prompt: '你画我猜游戏。请仔细观察这幅简笔画，猜测用户画的是什么。只回答一个最可能的中文词语或短句，不超过10个字。不要解释，直接给出答案。',
            images: [imageData],
            stream: false
          })
        });

        if (!response.ok) {
          throw new Error(`Ollama 返回错误: ${response.status}`);
        }

        const data = await response.json();
        const guess = data.response.trim();

        guessCount++;
        guessCountEl.textContent = guessCount;

        resultArea.className = 'result-area has-result';
        resultArea.innerHTML = `<div class="label">AI 猜测结果</div><div class="guess">${guess}</div>`;
        statusText.innerHTML = '<span class="status-dot"></span>完成';

        // Add to history
        historySection.style.display = 'block';
        const item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = `#${guessCount} ${guess}`;
        historyList.prepend(item);

      } catch (error) {
        resultArea.className = 'result-area has-error';
        resultArea.innerHTML = `
          <div class="label">出错了</div>
          <div class="guess" style="font-size: 14px; -webkit-text-fill-color: #f87171;">${error.message}</div>
        `;
        statusText.innerHTML = '<span class="status-dot error"></span>错误';
      } finally {
        guessBtn.disabled = false;
      }
    });

    // ========== Keyboard Shortcuts ==========
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undoBtn.click();
      }
    });

    // ========== Tab Switching ==========
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const targetId = btn.dataset.tab === 'draw' ? 'drawPanel' : 'uploadPanel';
        document.getElementById(targetId).classList.add('active');
      });
    });

    // ========== Image Upload & Recognition ==========
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const descResult = document.getElementById('descResult');
    let uploadedImageBase64 = null;

    // Click to upload
    uploadZone.addEventListener('click', () => {
      if (!uploadedImageBase64) fileInput.click();
    });

    // Drag & Drop
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleImageFile(file);
    });

    // File input change
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleImageFile(e.target.files[0]);
    });

    function handleImageFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImageBase64 = e.target.result.split(',')[1];
        uploadZone.classList.add('has-image');
        uploadZone.innerHTML = `
          <img src="${e.target.result}" class="upload-preview" alt="预览">
          <div class="upload-actions">
            <button class="btn btn-reupload" id="reuploadBtn">🔄 重新选择</button>
            <button class="btn btn-describe" id="describeBtn">🔍 让 AI 描述</button>
          </div>
        `;
        // Bind buttons
        document.getElementById('reuploadBtn').addEventListener('click', (ev) => {
          ev.stopPropagation();
          resetUpload();
        });
        document.getElementById('describeBtn').addEventListener('click', (ev) => {
          ev.stopPropagation();
          describeImage();
        });
        // Reset desc result
        descResult.className = 'desc-result';
        descResult.innerHTML = `
          <div class="label">AI 图片描述</div>
          <div class="desc-text-placeholder">点击「让 AI 描述」开始识别</div>
        `;
      };
      reader.readAsDataURL(file);
    }

    function resetUpload() {
      uploadedImageBase64 = null;
      fileInput.value = '';
      uploadZone.classList.remove('has-image');
      uploadZone.innerHTML = `
        <div class="upload-icon">📤</div>
        <div class="upload-text">拖拽图片到这里，或 <strong>点击选择文件</strong></div>
        <div class="upload-hint">支持 JPG / PNG / GIF / WebP</div>
      `;
      descResult.className = 'desc-result';
      descResult.innerHTML = `
        <div class="label">AI 图片描述</div>
        <div class="desc-text-placeholder">上传一张图片，让 AI 告诉你图片里有什么</div>
      `;
    }

    async function describeImage() {
      if (!uploadedImageBase64) return;

      const descBtn = document.getElementById('describeBtn');
      if (descBtn) descBtn.disabled = true;

      descResult.className = 'desc-result';
      descResult.innerHTML = `
        <div class="label">AI 图片描述</div>
        <div style="text-align:center">
          <div class="loading-spinner"></div>
          <div class="loading">AI 正在仔细观察这张图片…</div>
        </div>
      `;

      try {
        const response = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gemma3',
            prompt: '请用中文详细描述这张图片中的内容。包括：1. 图片中有什么主要物体或人物；2. 场景和环境；3. 颜色和氛围。请用自然流畅的中文描述，大约100-200字。',
            images: [uploadedImageBase64],
            stream: false
          })
        });

        if (!response.ok) throw new Error(`Ollama 返回错误: ${response.status}`);

        const data = await response.json();
        const description = data.response.trim();

        descResult.className = 'desc-result has-result';
        descResult.innerHTML = `
          <div class="label">AI 图片描述</div>
          <div class="desc-text">${description}</div>
        `;
      } catch (error) {
        descResult.className = 'desc-result';
        descResult.innerHTML = `
          <div class="label">出错了</div>
          <div class="desc-text" style="color: #f87171; text-align: center;">${error.message}</div>
        `;
      } finally {
        if (descBtn) descBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
